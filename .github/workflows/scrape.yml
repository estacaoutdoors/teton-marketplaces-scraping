permissions:
  contents: write
name: Daily Marketplace Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-save

      - name: Run marketplace scraper
        id: scrape
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: npm run scrape

      - name: Commit results history
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/results.json data/alerts.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily results $(date -u +%F) [skip ci]"
            git push
          fi

      # Email ONLY when the scraper found real issues (not every day)
      - name: Send alert email
        if: steps.scrape.outputs.has_alerts == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '⚠️ TETON Marketplaces: issues detected'
          to: jcsaucedo90@gmail.com
          from: ${{ secrets.EMAIL_FROM }}
          body: file://data/alerts.md

      # Email if the job itself crashed (auth failure, sheet unreachable, etc.)
      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '❌ TETON Marketplace scraper crashed'
          to: jcsaucedo90@gmail.com
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            The scraper workflow itself failed (not a price issue).
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
